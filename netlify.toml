[build]
  command = "npm run build:client"
  publish = "dist/spa"
  functions = "netlify/functions"

[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Serve ZIP directly before SPA catch-all
[[redirects]]
  from = "/QTrustExtension.zip"
  to = "/QTrustExtension.zip"
  status = 200
  force = true

[[headers]]
  for = "/QTrustExtension.zip"
  [headers.values]
    Content-Type = "application/zip"
    Content-Disposition = "attachment; filename=QTrustExtension.zip"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200